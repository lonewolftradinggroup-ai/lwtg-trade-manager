<title>LWTG MITS — Trade Journal v2.3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg:        #0a0c0f;
    --surface:   #111418;
    --surface2:  #181c22;
    --border:    #252d38;
    --border2:   #2e3a48;
    --text:      #d4e0ec;
    --muted:     #6a8499;
    --accent:    #e8852a;
    --accent-dim:#1a1508;
    --green:     #00e07a;
    --green-dim: #011a0e;
    --red:       #f03a3a;
    --red-dim:   #1f0808;
    --flat:      #181c22;
    --blue:      #4a9fff;
    --lwtg-hi:   #aaee22;
    --lwtg-mid:  #66cc00;
    --mono:      'DM Mono', monospace;
    --sans:      'DM Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 20px;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid #1a5a50;
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .logo-main {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.08em;
  }

  .logo-sub {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: blink 2s infinite;
  }

  .status-dot.error { background: var(--red); animation: none; }
  .status-dot.loading { background: var(--blue); }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── Summary strip ── */
  .summary-strip {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 12px 14px;
  }

  .summary-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .summary-value {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .summary-value.green { color: var(--green); }
  .summary-value.red   { color: var(--red); }

  /* ── Calendar nav ── */
  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .cal-title {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.06em;
  }

  .nav-btns {
    display: flex;
    gap: 8px;
  }

  .nav-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }

  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Calendar ── */
  .calendar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 24px;
    max-width: 67%;
  }

  .cal-header-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border-bottom: 1px solid var(--border);
  }

  .cal-dow {
    padding: 10px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-align: center;
    text-transform: uppercase;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
  }

  .cal-day {
    min-height: 68px;
    padding: 7px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    cursor: default;
    transition: background 0.15s;
    position: relative;
  }

  .cal-day:nth-child(7n) { border-right: none; }

  .cal-day.empty {
    background: var(--bg);
    opacity: 0.4;
  }

  .cal-day.has-trades {
    cursor: pointer;
  }

  .cal-day.has-trades:hover {
    background: var(--surface2);
  }

  .cal-day.selected {
    background: var(--surface2);
    border-color: var(--accent);
    box-shadow: inset 0 0 0 1px var(--accent);
  }

  .cal-day.today .day-num {
    color: var(--accent);
  }

  .day-num {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
  }

  .day-pnl {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .day-pnl.green { color: var(--green); }
  .day-pnl.red   { color: var(--red); }
  .day-pnl.flat  { color: var(--muted); }

  .day-wl {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text);
    margin-bottom: 3px;
  }

  .day-wr {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text);
    margin-bottom: 3px;
  }

  .day-vol {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .day-instruments {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    margin-top: 4px;
  }

  .inst-badge {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    letter-spacing: 0.05em;
  }

  .inst-badge.MES { background: #0d2a1a; color: #00c060; border: 1px solid #00c06030; }
  .inst-badge.MNQ { background: #0d1a2a; color: #3a8fff; border: 1px solid #3a8fff30; }
  .inst-badge.M2K { background: #2a1a0d; color: #ff9a3a; border: 1px solid #ff9a3a30; }
  .inst-badge.MGC { background: #2a240d; color: #c9a84c; border: 1px solid #c9a84c30; }

  /* ── Day detail panel ── */
  .detail-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    display: none;
  }

  .detail-panel.visible { display: block; }

  .detail-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .detail-date {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
  }

  .detail-summary {
    display: flex;

  /* ── Trade table ── */

  .trade-table tr:last-child td { border-bottom: none; }

  .trade-table tr:hover td { background: var(--surface2); }

  .result-tp {

  /* ── Instrument filter ── */

  .filter-btn {
    padding: 4px 12px;

  /* ── No trades message ── */

  /* ── Loading ── */

    text-align: center;
    padding: 60px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;

  /* v2.2 GAS setup modal */
  #gas-setup-overlay { position:fixed; inset:0; background:rgba(6,8,10,0.92); z-index:9999;
    display:flex; align-items:center; justify-content:center; }
  .gas-setup-card { background:var(--surface); border:1px solid var(--border2); border-radius:10px;
    padding:28px 30px; width:min(520px, 92vw); box-shadow:0 8px 40px rgba(0,0,0,0.6); }
  .gas-setup-title { font-family:'Playfair Display', serif; font-size:20px; font-weight:700;
    color:var(--lwtg-hi); margin-bottom:8px; }
  .gas-setup-sub { font-size:12px; color:var(--muted); line-height:1.6; margin-bottom:16px; }
  #gas-setup-input { width:100%; background:var(--bg); border:1px solid var(--border2); border-radius:6px;
    color:var(--text); font-family:'DM Mono', monospace; font-size:12px; padding:10px 12px; }
  #gas-setup-input:focus { outline:none; border-color:var(--lwtg-mid); }
  #gas-setup-err { color:var(--red); font-size:11px; min-height:16px; margin:8px 0; }
  #gas-setup-save { background:var(--lwtg-hi); color:#0a0c0f; border:none; border-radius:6px;

  /* ── Mobile responsive ─────────────────────────────── */
  @media (max-width: 600px) {

  }
</style>
</head>

<script>
// ============================================================
// CONFIG — paste your GAS web app URL here
// ============================================================
// v2.2: GAS URL is user-configured (first-run prompt) and persisted in
// localStorage — one distributed file serves every user with their own
// backend. Change anytime via the gear button in the header.
const GAS_URL_KEY = "lwtg_gas_url";
const GAS_URL_DEFAULT = "https://script.google.com/macros/s/AKfycbwYH4XspUne-iVKzmudb-ftTXsTkVjB_Z5lFl2niB1eqLU_NS_gEn6bHCu1fcxsh6rU/exec";
function getGasUrl() { return localStorage.getItem(GAS_URL_KEY) || GAS_URL_DEFAULT; }
function tradelogUrl() { return getGasUrl() + "?action=tradelog"; }

function isValidGasUrl(u) {
  return /^https:\/\/script\.google\.com\/macros\/s\/[\w-]+\/exec$/.test((u || "").trim());
}

function showGasSetup(prefill) {
  let overlay = document.getElementById("gas-setup-overlay");
  if (!overlay) {
    overlay = document.createElement("div");
    overlay.id = "gas-setup-overlay";
    overlay.innerHTML = `
      <div class="gas-setup-card">
        <div class="gas-setup-title">Connect Your Trading Log</div>
        <div class="gas-setup-sub">Paste your Google Apps Script Web App URL (ends in <b>/exec</b>).<br>
          Found in your GAS project under <b>Deploy &rarr; Manage deployments</b>.</div>
        <input id="gas-setup-input" type="text" placeholder="https://script.google.com/macros/s/…/exec" spellcheck="false">
        <div id="gas-setup-err"></div>
        <button id="gas-setup-save">SAVE &amp; CONNECT</button>
      </div>`;
    document.body.appendChild(overlay);
    document.getElementById("gas-setup-save").onclick = () => {
      const v = document.getElementById("gas-setup-input").value.trim();
      if (!isValidGasUrl(v)) {
        document.getElementById("gas-setup-err").textContent =
          "That doesn't look like a GAS /exec URL — check for typos and make sure it ends in /exec.";
        return;
      }
      localStorage.setItem(GAS_URL_KEY, v);
      overlay.remove();
      location.reload();
    };
  }
  document.getElementById("gas-setup-input").value = prefill || "";
  document.getElementById("gas-setup-err").textContent = "";
}

// ============================================================
// STATE
// ============================================================
let allTrades   = [];
let activeStratFilter = "ALL";
let activeInstFilter  = "ALL";
let viewYear    = new Date().getFullYear();
let viewMonth   = new Date().getMonth(); // 0-indexed
let selectedDay = null;

// ============================================================
// BOOT
// ============================================================
window.addEventListener("DOMContentLoaded", () => {
  loadTrades();
  setInterval(loadTrades, 60000); // refresh every 60s
});

// ============================================================
// LOAD TRADES
// ============================================================
async function loadTrades() {
  if (!getGasUrl()) { showGasSetup(""); return; }
  const dot = document.getElementById("status-dot");
  const txt = document.getElementById("status-text");
  dot.className = "status-dot loading";
  txt.textContent = "Fetching trade data...";

  try {
    const resp = await fetch(tradelogUrl(), { cache: "no-store" });
    const data = await resp.json();

    if (data.error) throw new Error(data.error);

    allTrades = data.trades || [];
    dot.className = "status-dot";
    const t = new Date().toLocaleTimeString("en-US", { timeZone: "America/Chicago", hour: "2-digit", minute: "2-digit" });
    txt.textContent = `${allTrades.length} trades — updated ${t} CDT`;

    renderCalendar();
    renderSummary();
  } catch(err) {
    dot.className = "status-dot error";
    txt.textContent = "Failed to load — " + err.message;
    console.error(err);
  }
}

// ============================================================
// FILTER
// ============================================================
function setStratFilter(strat) {
  activeStratFilter = strat;
  document.querySelectorAll(".filter-row:first-of-type .filter-btn").forEach(b => {
    const s = b.textContent.trim();
    b.classList.toggle("active", s === strat);
    // Apply strategy color class when active
    ['s-MITS','s-QC-Signals'].forEach(c => {
      if (b.classList.contains(c)) b.classList.toggle("active", s === strat);
    });
  });
  if (selectedDay) showDetail(selectedDay);
  renderCalendar();
  renderSummary();
}

function setInstFilter(sym) {
  activeInstFilter = sym;
  document.querySelectorAll(".instrument-row .filter-btn").forEach(b => {
    b.classList.toggle("active", b.textContent.trim() === sym);
  });
  if (selectedDay) showDetail(selectedDay);
  renderCalendar();
  renderSummary();
}

function filteredTrades() {
  return allTrades.filter(t => {
    const stratOK = activeStratFilter === "ALL" || t.strategy === activeStratFilter;
    const instOK  = activeInstFilter  === "ALL" || t.symbol   === activeInstFilter;
    return stratOK && instOK;
  });
}

// ============================================================
// SUMMARY STRIP
// ============================================================
function renderSummary() {
  const trades = filteredTrades().filter(t => {
    const d = new Date(t.date + "T12:00:00");
    return d.getFullYear() === viewYear && d.getMonth() === viewMonth;
  });

  // All trades this month (unfiltered) for strategy breakdown
  const allMonthTrades = allTrades.filter(t => {
    const d = new Date(t.date + "T12:00:00");
    return d.getFullYear() === viewYear && d.getMonth() === viewMonth;
  });

  const totalPnl = trades.reduce((s, t) => s + t.pnl_usd, 0);
  const wins     = trades.filter(t => t.result === "TP").length;
  const wr       = trades.length ? (wins / trades.length * 100).toFixed(1) : null;

  // best/worst day
  const byDay = {};
  trades.forEach(t => { byDay[t.date] = (byDay[t.date] || 0) + t.pnl_usd; });
  const dayVals = Object.values(byDay);
  const best  = dayVals.length ? Math.max(...dayVals) : null;
  const worst = dayVals.length ? Math.min(...dayVals) : null;

  const pnlEl = document.getElementById("sum-pnl");
  pnlEl.textContent = trades.length ? fmt$(totalPnl) : "—";
  pnlEl.className = "summary-value" + (totalPnl >= 0 ? " green" : " red");

  document.getElementById("sum-trades").textContent = trades.length || "—";
  document.getElementById("sum-wr").textContent = wr ? wr + "%" : "—";
  document.getElementById("sum-best").textContent  = best  !== null ? fmt$(best)  : "—";
  document.getElementById("sum-worst").textContent = worst !== null ? fmt$(worst) : "—";

  // Monthly strategy breakdown pills
  const stratColors = {
    "MITS":"#3a8fff","QC Signals":"#00e87a"
  };
  const stratBreakEl = document.getElementById("month-strat-breakdown");
  if (stratBreakEl) {
    const strats = [...new Set(allMonthTrades.map(t => t.strategy))].filter(Boolean).sort();
    stratBreakEl.innerHTML = "";
    strats.forEach(function(s) {
      const st = allMonthTrades.filter(t => t.strategy === s);
      const sw = st.filter(t => t.result === "TP").length;
      const sp = st.reduce((sum, t) => sum + t.pnl_usd, 0);
      const swr = st.length ? Math.round(sw / st.length * 100) : 0;
      const col = stratColors[s] || "var(--muted)";
      const pnlCol = sp >= 0 ? "var(--green)" : "var(--red)";
      const pill = document.createElement("div");
      pill.className = "month-strat-pill";
      pill.style.borderColor = col + "30";
      pill.innerHTML = '<span class="pill-name" style="color:' + col + '">' + s + '</span>' +
        '<span class="pill-wr">' + swr + '%</span>' +
        '<span class="pill-pnl" style="color:' + pnlCol + '">' + fmt$(sp) + '</span>';
      stratBreakEl.appendChild(pill);
    });
  }
}

// ============================================================
// CALENDAR
// ============================================================
function renderCalendar() {
  const months = ["January","February","March","April","May","June",
                  "July","August","September","October","November","December"];
  document.getElementById("cal-title").textContent = `${months[viewMonth]} ${viewYear}`;

  const trades = filteredTrades();
  const today  = new Date();

  // Build day map for this month
  const dayMap = {};
  trades.forEach(t => {
    const d = new Date(t.date + "T12:00:00");
    if (d.getFullYear() !== viewYear || d.getMonth() !== viewMonth) return;
    const key = t.date;
    if (!dayMap[key]) dayMap[key] = [];
    dayMap[key].push(t);
  });

  // Calendar grid
  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

  const grid = document.getElementById("cal-grid");
  grid.innerHTML = "";

  // Empty cells before month start
  for (let i = 0; i < firstDay; i++) {
    const cell = document.createElement("div");
    cell.className = "cal-day empty";
    grid.appendChild(cell);
  }

  // Day cells
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${viewYear}-${String(viewMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const dayTrades = dayMap[dateStr] || [];
    const isToday = (d === today.getDate() && viewMonth === today.getMonth() && viewYear === today.getFullYear());
    const isSelected = selectedDay === dateStr;

    const cell = document.createElement("div");
    cell.className = "cal-day" +
      (dayTrades.length ? " has-trades" : "") +
      (isToday ? " today" : "") +
      (isSelected ? " selected" : "");

    // Day number
    const numEl = document.createElement("div");
    numEl.className = "day-num";
    numEl.textContent = d;
    cell.appendChild(numEl);

    if (dayTrades.length) {
      const pnl   = dayTrades.reduce((s, t) => s + t.pnl_usd, 0);
      const wins  = dayTrades.filter(t => t.result === "TP").length;
      const total = dayTrades.length;
      const vols  = dayTrades.reduce((s, t) => s + t.contracts, 0);
      const wr    = (wins / total * 100).toFixed(0);
      const syms  = [...new Set(dayTrades.map(t => t.symbol))];

      const pnlEl = document.createElement("div");
      pnlEl.className = "day-pnl " + (pnl > 0 ? "green" : pnl < 0 ? "red" : "flat");
      pnlEl.textContent = fmt$(pnl);
      cell.appendChild(pnlEl);

      const wlEl = document.createElement("div");
      wlEl.className = "day-wl";
      wlEl.textContent = `W: ${wins} / L: ${total - wins}`;
      cell.appendChild(wlEl);

      const wrEl = document.createElement("div");
      wrEl.className = "day-wr";
      wrEl.textContent = `WR: ${wr}%`;
      cell.appendChild(wrEl);

      const volEl = document.createElement("div");
      volEl.className = "day-vol";
      volEl.textContent = `Vol: ${vols}`;
      cell.appendChild(volEl);

      const instEl = document.createElement("div");
      instEl.className = "day-instruments";
      syms.forEach(sym => {
        const badge = document.createElement("span");
        badge.className = `inst-badge ${sym}`;
        badge.textContent = sym;
        instEl.appendChild(badge);
      });
      cell.appendChild(instEl);

      cell.addEventListener("click", () => showDetail(dateStr));
    }

    grid.appendChild(cell);
  }
}

// ============================================================
// DAY DETAIL
// ============================================================
function showDetail(dateStr) {
  selectedDay = dateStr;
  renderCalendar();

  const allDayTrades = allTrades.filter(t => t.date === dateStr);
  const trades = filteredTrades().filter(t => t.date === dateStr)
    .sort((a, b) => a.time.localeCompare(b.time));

  const panel   = document.getElementById("detail-panel");
  const dateEl  = document.getElementById("detail-date");
  const sumEl   = document.getElementById("detail-summary");
  const tbody   = document.getElementById("detail-tbody");
  const stratBk = document.getElementById("strat-breakdown");

  const d = new Date(dateStr + "T12:00:00");
  const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  dateEl.textContent = days[d.getDay()] + ", " + months[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear();

  const pnl  = trades.reduce((s, t) => s + t.pnl_usd, 0);
  const wins = trades.filter(t => t.result === "TP").length;
  const wr   = trades.length ? (wins / trades.length * 100).toFixed(1) : 0;

  sumEl.innerHTML =
    "<span>PnL: <span style=\"color:" + (pnl>=0?"var(--green)":"var(--red)") + "\">" + fmt$(pnl) + "</span></span>" +
    "<span>Trades: <span>" + trades.length + "</span></span>" +
    "<span>W/L: <span>" + wins + "/" + (trades.length - wins) + "</span></span>" +
    "<span>Win Rate: <span>" + wr + "%</span></span>";

  // Strategy breakdown
  const stratColors = {
    "MITS":"#3a8fff","QC Signals":"#00e87a"
  };
  const strategies = [...new Set(allDayTrades.map(t => t.strategy))].filter(Boolean).sort();
  if (strategies.length >= 1 && activeStratFilter === "ALL") {
    stratBk.style.display = "grid";
    stratBk.innerHTML = strategies.map(function(s) {
      const st = allDayTrades.filter(t => t.strategy === s);
      const sw = st.filter(t => t.result === "TP").length;
      const sp = st.reduce((sum, t) => sum + t.pnl_usd, 0);
      const swr = st.length ? Math.round(sw / st.length * 100) : 0;
      const insts = [...new Set(st.map(t => t.symbol))].sort();
      const instStr = insts.map(function(i) {
        const it = st.filter(t => t.symbol === i);
        const iw = it.filter(t => t.result === "TP").length;
        return "<span class=\"inst-badge " + i + "\" style=\"font-size:9px;padding:1px 5px;\">" + i + " " + iw + "W/" + (it.length-iw) + "L</span>";
      }).join(" ");
      const col = stratColors[s] || "var(--muted)";
      const pnlCol = sp >= 0 ? "var(--green)" : "var(--red)";
      return "<div class=\"strat-card\" style=\"border-left-color:" + col + "\">" +
        "<div class=\"strat-card-name\" style=\"color:" + col + "\">" + s + "</div>" +
        "<div class=\"strat-card-stats\">" + sw + "W / " + (st.length-sw) + "L · " + swr + "% WR</div>" +
        "<div class=\"strat-card-pnl\" style=\"color:" + pnlCol + "\">" + fmt$(sp) + "</div>" +
        "<div style=\"margin-top:5px;display:flex;gap:3px;flex-wrap:wrap;\">" + instStr + "</div>" +
        "</div>";
    }).join("");
  } else {
    stratBk.style.display = "none";
  }

  tbody.innerHTML = "";
  if (trades.length === 0) {
    tbody.innerHTML = "<tr><td colspan=\"13\" class=\"no-trades\">No trades matching current filters</td></tr>";
  } else {
    trades.forEach(function(t) {
      const tr = document.createElement("tr");
      const dir = t.direction || t.action || "";
      const isLong = dir.toLowerCase().includes("long") || dir.toLowerCase() === "buy";
      const col = stratColors[t.strategy] || "var(--muted)";
      tr.innerHTML =
        "<td><span style=\"font-size:9px;color:" + col + ";font-weight:700;\">" + (t.strategy||"—") + "</span></td>" +
        "<td>" + t.time + "</td>" +
        "<td><span class=\"inst-badge " + t.symbol + "\">" + t.symbol + "</span></td>" +
        "<td class=\"" + (isLong?"dir-long":"dir-short") + "\">" + (isLong?"▲ LONG":"▼ SHORT") + "</td>" +
        "<td>" + t.entry.toFixed(2) + "</td>" +
        "<td>" + t.exit.toFixed(2) + "</td>" +
        "<td class=\"" + (t.result==="TP"?"result-tp":"result-sl") + "\">" + (t.result==="TP"?"TP ✓":"SL ✗") + "</td>" +
        "<td class=\"" + (t.pnl_usd>=0?"pnl-pos":"pnl-neg") + "\">" + fmt$(t.pnl_usd) + "</td>" +
        "<td class=\"" + (t.pnl_pts>=0?"pnl-pos":"pnl-neg") + "\">" + t.pnl_pts.toFixed(2) + "</td>" +
        "<td>" + t.contracts + "</td>" +
        "<td>" + (t.confluence||"—") + "</td>" +
        "<td>" + (t.rsi?t.rsi.toFixed(1):"—") + "</td>" +
        "<td>" + (t.adx?t.adx.toFixed(1):"—") + "</td>";
      tbody.appendChild(tr);
    });
  }

  panel.classList.add("visible");
  panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
}
function closeDetail() {
  selectedDay = null;
  document.getElementById("detail-panel").classList.remove("visible");
  renderCalendar();
}

// ============================================================
// NAV
// ============================================================
function prevMonth() {
  viewMonth--;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  renderCalendar();
  renderSummary();
  closeDetail();
}

function nextMonth() {
  viewMonth++;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  renderCalendar();
  renderSummary();
  closeDetail();
}

function goToday() {
  const now = new Date();
  viewYear  = now.getFullYear();
  viewMonth = now.getMonth();
  renderCalendar();
  renderSummary();
  closeDetail();
}

// ============================================================
// UTILS
// ============================================================
function fmt$(v) {
  const abs = Math.abs(v).toFixed(2);
  return (v < 0 ? "-$" : "$") + parseFloat(abs).toLocaleString("en-US", { minimumFractionDigits: 2 });
}
</script>
